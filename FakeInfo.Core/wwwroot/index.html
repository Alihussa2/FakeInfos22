<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Person Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0c10;
            --surface: #12151c;
            --surface-hover: #1a1e28;
            --border: #1e2330;
            --border-light: #2a3040;
            --text: #e8eaf0;
            --text-muted: #6b7394;
            --accent: #4f8ff7;
            --accent-glow: rgba(79, 143, 247, 0.15);
            --accent-secondary: #7c5bf5;
            --success: #34d399;
            --danger: #f87171;
            --card-radius: 16px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(79,143,247,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -15%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(124,91,245,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header .tag {
            display: inline-block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(79,143,247,0.2);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
            background: linear-gradient(135deg, #e8eaf0 0%, #8b92b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 12px;
            font-weight: 300;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .divider-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border-light);
            margin: 0 4px;
        }

        button {
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            padding: 12px 24px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px rgba(79,143,247,0.2), 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn-primary:hover {
            background: #6aa0f9;
            box-shadow: 0 0 30px rgba(79,143,247,0.3), 0 4px 12px rgba(0,0,0,0.4);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-light);
            transform: translateY(-1px);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px 4px 4px 16px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            font-family: 'DM Mono', monospace;
        }

        input[type="number"] {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            width: 60px;
            background: transparent;
            border: none;
            color: var(--text);
            outline: none;
            text-align: center;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .input-group .btn-secondary {
            padding: 8px 16px;
            border: none;
            background: var(--surface-hover);
        }

        /* Error message */
        .error {
            text-align: center;
            color: var(--danger);
            font-size: 14px;
            font-family: 'DM Mono', monospace;
            min-height: 20px;
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .error:not(:empty) {
            opacity: 1;
        }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            margin-top: 8px;
        }

        h2 {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 28px;
            margin-bottom: 16px;
            animation: cardIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            border-color: var(--border-light);
            background: var(--surface-hover);
        }

        .card h3 {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .field {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid rgba(30, 35, 48, 0.5);
        }
        .field:last-child {
            border-bottom: none;
        }

        .field-label {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .field-value {
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            text-align: right;
        }

        .field-value.mono {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            color: var(--accent);
        }

        .hidden {
            display: none;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: var(--card-radius);
        }
        .empty-state .icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Loading spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 32px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'DM Mono', monospace;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 32px 16px 48px; }
            .controls { flex-direction: column; }
            .divider-dot { display: none; }
            .field { flex-direction: column; gap: 4px; }
            .field-value { text-align: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="tag">v1.0 · .net 8</div>
        <h1>Fake Danish<br>Person Generator</h1>
        <p>Generér realistiske, fiktive persondata til test og udvikling</p>
    </div>

    <div class="controls">
        <button id="generatePersonBtn" class="btn-primary">Generér person</button>

        <div class="divider-dot"></div>

        <div class="input-group">
            <label for="bulkCount">antal</label>
            <input type="number" id="bulkCount" value="5" min="2" max="100">
            <button id="generateBulkBtn" class="btn-secondary">Generér flere</button>
        </div>
    </div>

    <div id="errorMessage" class="error"></div>

    <div class="section-header">
        <h2>Enkelt person</h2>
        <div class="section-line"></div>
    </div>
    <div id="singleResult" class="hidden"></div>
    <div id="singleEmpty" class="empty-state">
        <div class="icon">↑</div>
        Tryk på knappen for at generere en person
    </div>

    <div class="section-header" style="margin-top: 32px;">
        <h2>Bulk</h2>
        <div class="section-line"></div>
    </div>
    <div id="bulkResult"></div>
    <div id="bulkEmpty" class="empty-state">
        <div class="icon">↑</div>
        Vælg antal og generér flere personer
    </div>

    <div class="footer">
        fake person generator · exam project 2026
    </div>
</div>

<script src="app.js"></script>
