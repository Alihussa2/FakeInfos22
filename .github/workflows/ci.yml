name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore FakeInfo.Core/FakeInfo.Core.csproj
          dotnet restore FakeInfo.Tests/FakeInfo.Tests.csproj
          dotnet restore FakeInfo.IntegrationTests/FakeInfo.IntegrationTests.csproj

      - name: Build
        run: dotnet build FakeInfo.Core/FakeInfo.Core.csproj --no-restore

      - name: Run unit tests
        run: dotnet test FakeInfo.Tests/FakeInfo.Tests.csproj --verbosity normal

      - name: Run integration tests
        run: dotnet test FakeInfo.IntegrationTests/FakeInfo.IntegrationTests.csproj --verbosity normal